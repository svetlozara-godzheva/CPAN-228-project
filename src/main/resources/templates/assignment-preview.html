<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduPlatform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>
<nav th:replace="~{fragment/navbar :: navbar}"></nav>
<div class="container">
    <div class="row mb-4 align-items-center">
        <div class="col">
            <h2 th:text="${assignment.name}">Assignment Name</h2>
        </div>
        <div class="col-auto">
            <a th:href="@{/assignments/{id}/edit(id=${assignment.id})}" class="btn btn-primary">Edit</a>
        </div>
    </div>
    <hr/>

    <dl class="row">
        <dt class="col-sm-3">Name</dt>
        <dd class="col-sm-9" th:text="${assignment.name}">Assignment Name</dd>

        <dt class="col-sm-3">Description</dt>
        <dd class="col-sm-9" th:text="${assignment.description}">Assignment Description</dd>

        <dt class="col-sm-3">Due Date</dt>
        <dd class="col-sm-9"
            th:text="${assignment.dueDate != null ? #temporals.format(assignment.dueDate, 'yyyy.MM.dd HH:mm') : '-'}">
            Due Date
        </dd>
    </dl>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
