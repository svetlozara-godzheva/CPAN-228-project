<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduPlatform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>
<nav th:replace="~{fragment/navbar :: navbar}"></nav>
<div class="container">
    <div class="row mb-4 align-items-center">
        <div class="col">
            <h2>Create Course</h2>
        </div>
    </div>
    <hr/>

    <form method="post" th:action="@{/courses/create}" th:object="${course}" class="col-md-6">
        <div class="mb-3">
            <label for="code" class="form-label">Code</label>
            <input type="text" id="code" th:field="*{code}" placeholder="Enter Code" class="form-control"
                   th:errorclass="is-invalid">
            <div class="invalid-feedback" th:errors="*{code}">Code error</div>
        </div>

        <div class="mb-3">
            <label for="name" class="form-label">Name</label>
            <input type="text" id="name" th:field="*{name}" placeholder="Enter Name" class="form-control"
                   th:errorclass="is-invalid">
            <div class="invalid-feedback" th:errors="*{name}">Name error</div>
        </div>

        <div class="mb-3">
            <label for="description" class="form-label">Description</label>
            <textarea id="description" th:field="*{description}" placeholder="Enter Description" class="form-control"
                      rows="3" th:errorclass="is-invalid"></textarea>
            <div class="invalid-feedback" th:errors="*{description}">Description error</div>
        </div>

        <div class="mb-3">
            <label for="startDate" class="form-label">Start Date</label>
            <input type="datetime-local" id="startDate" th:field="*{startDate}" class="form-control"
                   th:errorclass="is-invalid">
            <div class="invalid-feedback" th:errors="*{startDate}">Start date error</div>
        </div>

        <div class="mb-3">
            <label for="endDate" class="form-label">End Date</label>
            <input type="datetime-local" id="endDate" th:field="*{endDate}" class="form-control"
                   th:errorclass="is-invalid">
            <div class="invalid-feedback" th:errors="*{endDate}">End date error</div>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Create course</button>
            <a th:href="@{/courses}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
