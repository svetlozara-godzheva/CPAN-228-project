<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduPlatform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>
<nav th:replace="~{fragment/navbar :: navbar}"></nav>
<div class="container">
    <div class="row mb-4 align-items-center">
        <div class="col">
            <h2>
                <span class="text-muted" th:text="${course.code}">Course Code</span>
                <span th:text="${course.name}">Course name</span>
            </h2>
        </div>
        <div class="col-auto">
            <a th:href="@{/courses/{id}/edit(id=${course.id})}" class="btn btn-primary">Edit</a>
        </div>
    </div>
    <hr/>

    <dl class="row">
        <dt class="col-sm-3">Code</dt>
        <dd class="col-sm-9" th:text="${course.code}">Course Code</dd>

        <dt class="col-sm-3">Name</dt>
        <dd class="col-sm-9" th:text="${course.name}">Course name</dd>

        <dt class="col-sm-3">Description</dt>
        <dd class="col-sm-9" th:text="${course.description}">Course description</dd>

        <dt class="col-sm-3">Start date</dt>
        <dd class="col-sm-9"
            th:text="${course.startDate != null ? #temporals.format(course.startDate, 'yyyy.MM.dd HH:mm') : '-'}">
            Start Date
        </dd>

        <dt class="col-sm-3">End date</dt>
        <dd class="col-sm-9"
            th:text="${course.endDate != null ? #temporals.format(course.endDate, 'yyyy.MM.dd HH:mm') : '-'}">
            End Date
        </dd>
    </dl>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
