<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduPlatform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>
<nav th:replace="~{fragment/navbar :: navbar}"></nav>
<div class="container">
    <div class="row mb-4 align-items-center">
        <div class="col">
            <h2>Create Assignment</h2>
        </div>
    </div>
    <hr/>

    <form method="post" th:action="@{/assignments/create}" th:object="${assignment}" class="col-md-6">
        <input type="hidden" th:field="*{courseId}"/>

        <div class="mb-3">
            <label for="name" class="form-label">Name</label>
            <input type="text" id="name" th:field="*{name}" placeholder="Enter Name" class="form-control"
                   th:errorclass="is-invalid">
            <div class="invalid-feedback" th:errors="*{name}">Name error</div>
        </div>

        <div class="mb-3">
            <label for="description" class="form-label">Description</label>
            <textarea id="description" th:field="*{description}" placeholder="Enter Description" class="form-control"
                      rows="3" th:errorclass="is-invalid"></textarea>
            <div class="invalid-feedback" th:errors="*{description}">Description error</div>
        </div>

        <div class="mb-3">
            <label for="dueDate" class="form-label">Due Date</label>
            <input type="datetime-local" id="dueDate" th:field="*{dueDate}" class="form-control"
                   th:errorclass="is-invalid">
            <div class="invalid-feedback" th:errors="*{dueDate}">Due date error</div>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Create</button>
            <a th:href="@{/courses/{id}(id=*{courseId})}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
